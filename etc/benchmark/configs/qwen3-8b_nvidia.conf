# ==================================================================
# Configuration for Qwen3-8B on NVIDIA GPUs
# ==================================================================

EXPERIMENT_NAME="warmup_test_ctx4096"

# --- Model Identification ---
# 모델의 이름과 경로를 지정합니다.
# MODEL_PATH는 Hugging Face 모델 ID 또는 로컬 경로가 될 수 있습니다.
MODEL_NAME="qwen3-8b-nvidia"
MODEL_PATH="Qwen/Qwen3-8B" # 예: /data/models/Qwen3-8B-Instruct

# --- Hardware & vLLM Server Configuration ---
# 테스트할 Tensor Parallel(TP) 크기를 공백으로 구분하여 지정합니다.
# 예: "1 2 4"
NUM_GPUS=8
TP_DEGREES="1 2 4 8"

# vLLM 서버에서 테스트할 최대 배치 크기(max_num_seqs)를 지정합니다.
# 예: "8 16 32"
BATCH_SIZES="1 2 4 8 16 32 64"

# 모델의 최대 시퀀스 길이를 지정합니다.
SEQ_LEN=4096

# --- LLMPerf Benchmark Configuration ---
# 서버에 보낼 동시 요청 수를 지정합니다.
# 예: "1 8 16 32"
LLMPERF_CONCURRENCIES="1 2 4 8 16 32 64"

# 벤치마크 워크로드의 입출력 토큰 조합을 지정합니다.
# 형식: "입력_평균 표준편차 출력_평균 표준편차"
LLMPERF_VARIATIONS=(
    "1024 0 256 0"
)

# --- LLMPerf Advanced Settings ---
LLMPERF_MAX_REQUESTS=256
LLMPERF_TIMEOUT=1200
LLMPERF_API_BASE="http://localhost:8000/v1"
LLMPERF_API_TYPE="openai"
LLMPERF_SAMPLING_PARAMS='{"temperature": 0.0}'

INSTANCE_PRICING_JSON='{
    "g6.48xlarge": {
        "ohio": {
            "on-demand": 13.3504
        }
    }
}'